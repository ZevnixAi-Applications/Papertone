name: Papertone

options:
  bundleIdPrefix: com.zevnix
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: "76Z3N79K53"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  Papertone:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zevnix.papertone
        PRODUCT_NAME: Papertone
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/Papertone.entitlements
        INFOPLIST_KEY_LSUIElement: "YES"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: "YES"
